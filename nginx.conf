# ══════════════════════════════════════════════════════════
# snspokes Nginx — Production Load Balancer
# Handles: SSL termination, load balancing, caching,
#          rate limiting, compression, static assets
# ══════════════════════════════════════════════════════════

# ── Worker processes = CPU cores ──────────────────────────
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 10240;
    multi_accept on;
    use epoll;
}

http {
    # ── Basic settings ─────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout       65;
    keepalive_requests      1000;
    reset_timedout_connection on;
    client_body_timeout     10;
    send_timeout            10;
    server_tokens           off;

    # ── Compression ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-javascript application/rss+xml
        image/svg+xml font/woff2;

    # ── Logging ────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main buffer=16k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ── Rate limiting zones ────────────────────────────────
    # Search API: 30 req/min per IP (enough for real users)
    limit_req_zone $binary_remote_addr zone=search_limit:10m  rate=120r/m;
    # General API: 120 req/min per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m     rate=120r/m;
    # Auth endpoints: 10 req/min per IP (brute force protection)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m    rate=60r/m;
    # Global: 300 req/min per IP
    limit_req_zone $binary_remote_addr zone=global_limit:20m  rate=300r/m;

    # ── Connection limiting ────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Proxy cache zone (for API responses) ──────────────
    proxy_cache_path /var/cache/nginx
        levels=1:2
        keys_zone=api_cache:20m
        max_size=1g
        inactive=1h
        use_temp_path=off;

    # ── Upstream: 3 Next.js instances (load balanced) ─────
    upstream nextjs_cluster {
    server snspokes_nextjs:3001;
    keepalive 32;
  }

    # ── HTTP → HTTPS redirect ──────────────────────────────
    server {
        listen 80;
        server_name snspokes.com www.snspokes.com;
        return 301 https://snspokes.com$request_uri;
    }

    # ── Main HTTPS server ──────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name snspokes.com www.snspokes.com;

        # SSL
        ssl_certificate     /etc/letsencrypt/live/snspokes.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/snspokes.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Connection limit: max 20 concurrent per IP
        limit_conn conn_limit 20;
        # Global rate limit
        limit_req zone=global_limit burst=50 nodelay;

        # Client limits
        client_max_body_size 10m;
        client_body_buffer_size 128k;

        # ── Static assets — serve with aggressive caching ──
        location ~* ^/(images|_next/static|fonts|icons)/ {
            proxy_pass http://nextjs_cluster;
            proxy_cache         api_cache;
            proxy_cache_valid   200 7d;        # cache for 7 days
            proxy_cache_use_stale error timeout updating http_500;
            proxy_cache_lock    on;
            add_header Cache-Control "public, max-age=604800, immutable";
            add_header X-Cache-Status $upstream_cache_status;
            access_log off;
        }

        # ── Next.js built assets (__next) ──────────────────
        location /_next/ {
            proxy_pass http://nextjs_cluster;
            proxy_cache         api_cache;
            proxy_cache_valid   200 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            access_log off;
        }

        # ── Search API — cache + rate limit ────────────────
        location = /api/search {
            limit_req zone=search_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://nextjs_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Cache search responses (keyed by query + context)
            proxy_cache         api_cache;
            proxy_cache_key     "$uri$is_args$args$request_body";
            proxy_cache_valid   200 1h;        # cache search for 1 hour
            proxy_cache_methods GET POST;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_lock    on;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ── Public flags API — high cache ──────────────────
        location = /api/flags {
            proxy_pass http://nextjs_cluster;
            proxy_cache        api_cache;
            proxy_cache_valid  200 60s;
            add_header Cache-Control "public, max-age=60";
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ── Spoke pages — cache for 5 minutes ──────────────
        location ~* ^/spoke/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://nextjs_cluster;
            proxy_cache        api_cache;
            proxy_cache_valid  200 5m;
            proxy_cache_use_stale error timeout;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ── Auth endpoints — strict rate limit ─────────────
        location ~* ^/api/auth/ {
            limit_req zone=auth_limit burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://nextjs_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── Admin routes — restricted rate limit ───────────
        location ~* ^/admin/ {
            limit_req zone=api_limit burst=15 nodelay;
            proxy_pass http://nextjs_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── SSE streaming — no buffering, no cache ─────────
        location = /api/stream {
            proxy_pass http://nextjs_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Accel-Buffering no;
            proxy_buffering       off;
            proxy_cache           off;
            proxy_read_timeout    120s;
            chunked_transfer_encoding on;
        }

        # ── Health check — no rate limit ───────────────────
        location = /api/health {
            proxy_pass http://nextjs_cluster;
            access_log off;
        }

        # ── Default: proxy to cluster ──────────────────────
        location / {
            proxy_pass http://nextjs_cluster;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
            proxy_buffer_size     4k;
            proxy_buffers         8 4k;
        }

        # ── 429 error page ─────────────────────────────────
        error_page 429 @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"error":"Too many requests. Please slow down.","retry_after":60}';
        }
    }

    # ── n8n subdomain ──────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name n8n.snspokes.com;
        ssl_certificate     /etc/letsencrypt/live/snspokes.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/snspokes.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        limit_req zone=api_limit burst=20 nodelay;
        location / {
            proxy_pass http://snspokes_n8n:5678;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
        }
    }
}
