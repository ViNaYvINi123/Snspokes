# ── Redirect all HTTP to HTTPS ──
server {
    listen 80;
    server_name snspokes.com www.snspokes.com n8n.snspokes.com;
    return 301 https://$host$request_uri;
}

# ── Main app (HTTPS) ──
server {
    listen 443 ssl;
    server_name snspokes.com www.snspokes.com;

    ssl_certificate /etc/letsencrypt/live/snspokes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/snspokes.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://snspokes_nextjs:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/stream {
        proxy_pass http://snspokes_nextjs:3001;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Accel-Buffering no;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding on;
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    client_max_body_size 10M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}

# ── n8n subdomain (HTTPS) ──
server {
    listen 443 ssl;
    server_name n8n.snspokes.com;

    ssl_certificate /etc/letsencrypt/live/snspokes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/snspokes.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://snspokes_n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ── Portainer subdomain (HTTPS) ──
server {
    listen 443 ssl;
    server_name portainer.snspokes.com;

    ssl_certificate /etc/letsencrypt/live/snspokes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/snspokes.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         https://portainer:9443;
        proxy_ssl_verify   off;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
