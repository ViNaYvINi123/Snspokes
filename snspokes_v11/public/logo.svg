<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="200" height="200" rx="40" ry="40" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="200" height="100" rx="40" ry="40" fill="url(#shine)"/>
  <!-- Hub circle center -->
  <circle cx="100" cy="100" r="22" fill="none" stroke="white" stroke-width="5" opacity="0.95"/>
  <!-- Spoke lines radiating out -->
  <line x1="100" y1="78" x2="100" y2="46" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
  <line x1="119" y1="85" x2="145" y2="63" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
  <line x1="122" y1="100" x2="154" y2="100" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
  <line x1="119" y1="115" x2="145" y2="137" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
  <line x1="100" y1="122" x2="100" y2="154" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
  <line x1="81" y1="115" x2="55" y2="137" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
  <line x1="78" y1="100" x2="46" y2="100" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
  <line x1="81" y1="85" x2="55" y2="63" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
  <!-- Endpoint dots -->
  <circle cx="100" cy="42" r="7" fill="white" opacity="0.95"/>
  <circle cx="148" cy="60" r="7" fill="white" opacity="0.95"/>
  <circle cx="158" cy="100" r="7" fill="white" opacity="0.95"/>
  <circle cx="148" cy="140" r="7" fill="white" opacity="0.95"/>
  <circle cx="100" cy="158" r="7" fill="white" opacity="0.95"/>
  <circle cx="52" cy="140" r="7" fill="white" opacity="0.95"/>
  <circle cx="42" cy="100" r="7" fill="white" opacity="0.95"/>
  <circle cx="52" cy="60" r="7" fill="white" opacity="0.95"/>
  <!-- Inner fill -->
  <circle cx="100" cy="100" r="12" fill="white" opacity="0.95"/>
</svg>
