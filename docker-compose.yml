version: '3.8'

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

# Log rotation — prevents disk fill
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

services:

  db:
    image: postgres:15-alpine
    container_name: snspokes_db
    logging: *default-logging
    restart: always
    environment:
      POSTGRES_DB: snspokes
      POSTGRES_USER: snspokes_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snspokes_user -d snspokes"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: snspokes_redis
    logging: *default-logging
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    logging: *default-logging
    restart: always
    ports:
      - "9443:9443"  # Portainer UI only
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks: [external]

  n8n:
    image: n8nio/n8n:latest
    container_name: snspokes_n8n
    logging: *default-logging
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - WEBHOOK_URL=https://n8n.snspokes.com
      - N8N_PROTOCOL=https
      - N8N_HOST=n8n.snspokes.com
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_TRUST_PROXY=true
      - N8N_PROXY_HOPS=1
      - N8N_PORT=5678
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=snspokes
      - DB_POSTGRESDB_USER=snspokes_user
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD:-changeme}
      - EXECUTIONS_PROCESS=main
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - GENERIC_TIMEZONE=UTC
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    # ports: ["5678:5678"]  # Accessed via nginx (n8n.snspokes.com)
    depends_on:
      db:
        condition: service_healthy
    networks: [internal, external]
    volumes:
      - n8ndata:/home/node/.n8n

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: snspokes_nextjs
    logging: *default-logging
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    env_file: .env.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [internal, external]
    ports: ["3001:3001"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: snspokes_nginx
    logging: *default-logging
    restart: always
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on: [nextjs, portainer]
    networks: [external]

volumes:
  pgdata:
  n8ndata:
  portainer_data:
