# snspokes Production Stack — Single instance
# Deploy: docker compose build --no-cache nextjs && docker compose up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── PostgreSQL ─────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: snspokes_db
    logging: *default-logging
    restart: always
    environment:
      POSTGRES_DB:       snspokes
      POSTGRES_USER:     snspokes_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=4MB
        -c max_connections=100
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snspokes_user -d snspokes"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: snspokes_redis
    logging: *default-logging
    restart: always
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Next.js ────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snspokes_nextjs
    logging: *default-logging
    restart: always
    env_file: .env.local
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Nginx ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: snspokes_nginx
    logging: *default-logging
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - nextjs
    networks: [internal, external]

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  pgdata:
