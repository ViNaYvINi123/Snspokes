version: '3.8'

services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: snspokes_nextjs_dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    env_file: .env.local
    ports: ["3001:3001"]
    networks: [internal, external]
    command: npm run dev
